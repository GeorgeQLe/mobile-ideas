name: React Native CI

on:
  push:
    branches: [main]
    paths:
      - 'variants/react-native/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'variants/react-native/**'
      - 'shared/**'

defaults:
  run:
    working-directory: variants/react-native

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/react-native/package-lock.json
      - run: npm ci
      - run: npx eslint src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/react-native/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/react-native/package-lock.json
      - run: npm ci
      - run: npx jest --ci --coverage

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/react-native/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: variants/react-native/android/app/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/react-native/package-lock.json
      - run: npm ci
      - run: cd ios && pod install
      - run: |
          xcodebuild build \
            -workspace ios/*.xcworkspace \
            -scheme ${{ github.event.repository.name }} \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

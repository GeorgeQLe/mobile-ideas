name: Expo CI

on:
  push:
    branches: [main]
    paths:
      - 'variants/expo/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'variants/expo/**'
      - 'shared/**'

defaults:
  run:
    working-directory: variants/expo

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/expo/package-lock.json
      - run: npm ci
      - run: npx eslint src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/expo/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/expo/package-lock.json
      - run: npm ci
      - run: npx jest --ci --coverage

  build:
    name: Build (Web Export)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: variants/expo/package-lock.json
      - run: npm ci
      - run: npx expo export --platform web
      - uses: actions/upload-artifact@v4
        with:
          name: expo-web-export
          path: variants/expo/dist/

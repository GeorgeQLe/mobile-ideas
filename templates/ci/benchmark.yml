name: Benchmark

on:
  workflow_dispatch:
    inputs:
      variants:
        description: 'Comma-separated list of variants to benchmark (leave empty for all)'
        required: false
        default: ''
  workflow_call:
    inputs:
      variants:
        description: 'Comma-separated list of variants to benchmark (leave empty for all)'
        required: false
        type: string
        default: ''

jobs:
  benchmark:
    name: Benchmark (${{ matrix.variant }})
    runs-on: ${{ matrix.variant == 'ios-native' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        variant: [react-native, flutter, expo, ios-native, android-native]
    steps:
      - uses: actions/checkout@v4

      - name: Check variant filter
        id: filter
        run: |
          INPUT="${{ inputs.variants }}"
          if [ -z "$INPUT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif echo ",$INPUT," | grep -q ",${{ matrix.variant }},"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        if: steps.filter.outputs.skip != 'true' && (matrix.variant == 'android-native' || matrix.variant == 'react-native')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        if: steps.filter.outputs.skip != 'true' && matrix.variant == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Xcode
        if: steps.filter.outputs.skip != 'true' && matrix.variant == 'ios-native'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install variant dependencies
        if: steps.filter.outputs.skip != 'true'
        working-directory: variants/${{ matrix.variant }}
        run: |
          if [ -f package.json ]; then
            npm ci
          elif [ -f pubspec.yaml ]; then
            flutter pub get
          fi

      - name: Run benchmark harness
        if: steps.filter.outputs.skip != 'true'
        run: |
          npx @mobile-benchmark/harness \
            --app ${{ github.repository }} \
            --variant ${{ matrix.variant }} \
            --output benchmark-results.json
        working-directory: variants/${{ matrix.variant }}

      - name: Upload scorecard
        if: steps.filter.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-scorecard-${{ matrix.variant }}
          path: variants/${{ matrix.variant }}/benchmark-results.json
